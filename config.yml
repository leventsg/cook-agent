# CookAgent 配置文件
# =============================================================================
# 本文件包含 CookAgent RAG 系统的全部应用配置。
# 敏感信息（如 API Key、密码等）应存储于 .env 文件中。
#
# 配置按照逻辑模块进行组织：
# 1. LLM 提供商配置（分层：fast / normal / vision）
# 2. Embedding 模型配置
# 3. 向量存储配置
# 4. RAG Pipeline 配置（检索、重排序、缓存）
# 5. Vision / 多模态配置
# 6. 评测配置
# 7. Web 搜索配置
# 8. 数据源配置
# 9. 数据库连接配置
# =============================================================================

# =============================================================================
# 1. LLM 提供商配置（分层：fast / normal / vision）
# =============================================================================
# 系统采用三层 LLM 模型架构：
#   - fast：针对低延迟场景优化（意图识别、查询重写等）
#   - normal：针对生成质量优化（最终响应生成）
#   - vision：用于图像分析的多模态模型
#
# 每一层均支持以下配置项：
#   - model_names：模型列表（每次调用随机选择一个）
#   - base_url：API 服务地址
#   - api_key：从 .env 加载的 API Key（FAST_LLM_API_KEY / LLM_API_KEY）
#   - temperature：生成随机性控制参数（0.0 - 2.0）
#   - max_tokens：最大生成 Token 数
# =============================================================================

llm:
  fast:
    model_names:
      # - "XiaomiMiMo/MiMo-V2-Flash"
      # - "deepseek-ai/DeepSeek-V3.2"
      # - "Qwen/Qwen3-235B-A22B-Instruct-2507"
      - "qwen3-235b-a22b-instruct-2507"
      # - "Qwen/Qwen3-VL-235B-A22B-Instruct"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    temperature: 1
    max_tokens: 131072


  normal:
    model_names:
      # - "Qwen/Qwen3-VL-30B-A3B-Instruct"
      - "qwen3-vl-30b-a3b-instruct"
      # - "deepseek-ai/DeepSeek-V3.2"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    temperature: 1
    max_tokens: 131072

  vision:
    model_names:
      # - "Qwen/QVQ-72B-Preview"
      - "qwen3-omni-flash"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    temperature: 0.7
    max_tokens: 4096
    max_image_size_mb: 10.0
    request_timeout: 120

# =============================================================================
# 2. Embedding 模型配置
# =============================================================================
# 用于将文本转换为向量，以支持语义检索。
# =============================================================================

embedding:
  # 用于文本向量化的 HuggingFace Embedding 模型名称
  # BGE 系列模型针对中文文本进行了优化
  model_name: "BAAI/bge-small-zh-v1.5"

# =============================================================================
# 3. 向量存储配置
# =============================================================================
# Milvus 向量数据库配置。
# 连接相关配置位于下方的 database.milvus 配置节中。
# =============================================================================

vector_store:
  type: "milvus"

  # 不同数据类型的集合名称
  collection_names:
    # 全局食谱集合（HowToCook）
    recipes: "cook_agent_recipes"
    # 用户个人文档集合（HowToCook）
    personal: "cook_agent_personal_docs"

# =============================================================================
# 4. RAG Pipeline 配置（检索、重排序、缓存）
# =============================================================================

# 4.1 检索配置
# ------------------------------------------------------------------------------
retrieval:
  # 检索文档数（Top-K）
  top_k: 9
  # 检索结果过滤阈值（0.0-1.0）
  score_threshold: 0.2
  # 重排序模型类型（weighted / rrf）
  ranker_type: "weighted"
  # 混合排序权重（dense_vector / sparse_bm25）
  ranker_weights: [0.8, 0.2]

# 4.2 重排序配置
# ------------------------------------------------------------------------------
# Reranker（重排序模型）会进一步优化检索结果，以提升结果相关性。
# 默认使用 normal 层 LLM 的 API Key（可通过 RERANKER_API_KEY 单独覆盖）
reranker:
  enabled: true
  # 目前仅支持 siliconflow，未来可扩展更多提供商
  type: "siliconflow"
  model_name: "Qwen/Qwen3-Reranker-8B"
  base_url: "https://api.siliconflow.cn/v1/rerank"
  temperature: 0.0
  max_tokens: 8192
  score_threshold: 0.2

# 4.3 缓存配置
# ------------------------------------------------------------------------------
# 两级缓存策略：
#   - L1：精确匹配缓存（Redis）—— 用于对完全相同查询进行快速查找
#   - L2：语义匹配缓存（Milvus）—— 基于向量相似度处理相似查询
#
# 注意：
# 缓存的仅为「Query -> Retrieved Documents（检索上下文）」映射，
# 不缓存 LLM 最终生成的响应结果。
#
# Redis 与 Milvus 的连接配置位于下方的
# database.redis 与 database.milvus 配置节中。
# ------------------------------------------------------------------------------
cache:
  enabled: true
  # 缓存过期时间（秒），同时应用于 L1 和 L2 缓存
  ttl: 3600  # 1 hour
  # L2 语义匹配缓存配置
  l2_enabled: true
  # L2 缓存相似度阈值（0.0-1.0）
  similarity_threshold: 0.92
  # L2 缓存存储名称（向量集合）
  vector_collection: "cookagent_retrieval_cache"

# =============================================================================
# 5. Vision / 多模态配置
# =============================================================================
# 用于视觉分析的领域检测配置。
# 模型相关配置位于 llm.vision 配置节中。
# =============================================================================

vision:
  model:
    enabled: true
    model_name: "qwen3-omni-flash"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    temperature: 0.7
    max_tokens: 4096
    max_image_size_mb: 10.0
    request_timeout: 120

# =============================================================================
# 6. RAG 评测配置（RAGAS）
# =============================================================================
# 基于 RAGAS 框架的质量评估与监控配置。
# =============================================================================

evaluation:
  enabled: true
  # 异步模式：在后台运行评估，不阻塞响应生成
  async_mode: true
  # 采样率（0.0-1.0）：要评估的请求比例
  # 1.0 = evaluate all requests, 0.1 = evaluate 10% of requests
  sample_rate: 1.0
  # RAGAS 评估指标
  # Available: "faithfulness", "answer_relevancy", "context_precision", "context_recall"
  metrics:
    - "faithfulness"
    - "answer_relevancy"
  # 用于评测任务的 LLM 配置层级（推荐使用 fast 层以降低成本）
  llm_type: "fast"
  # 评估超时时间（秒）
  timeout_seconds: 600
  # 质量告警阈值
  alert_thresholds:
    faithfulness: 0.3
    answer_relevancy: 0.5

# =============================================================================
# 7. Web 搜索配置（Tavily）
# =============================================================================
# 用于实时 Web 搜索增强的相关配置。
# =============================================================================

web_search:
  enabled: true
  # 最大返回搜索结果数
  max_results: 6

# =============================================================================
# 8. 图像生成配置（OpenAI DALL·E）
# =============================================================================
# 使用 OpenAI DALL·E 3 模型进行 AI 图像生成的相关配置。
# =============================================================================

image_generation:
  enabled: true
  model: "Kwai-Kolors/Kolors"
  base_url: "https://api.siliconflow.cn/v1"

# =============================================================================
# 9. MCP（模型上下文协议）配置
# =============================================================================
# 用于 MCP 服务器集成的相关配置。
# =============================================================================

mcp:
  # Amap（高德地图） MCP 服务器配置
  amap:
    enabled: true

# =============================================================================
# 10. 数据源配置
# =============================================================================
# 用于外部数据源（例如 HowToCook 菜谱库）的相关配置。
# =============================================================================

data_source:
  howtocook:
    # 菜谱子目录路径缀缀
    path_suffix: "dishes"
    # tips 子目录路径缀缀
    tips_path_suffix: "tips"
    # Markdown 分隔符
    headers_to_split_on:
      - ["#", "header_1"]
      - ["##", "header_2"]

# =============================================================================
# 11. 数据库连接配置
# =============================================================================
# PostgreSQL、Redis 与 Milvus 的连接相关配置。
# 出于安全考虑，密码应从 .env 文件中加载。
# =============================================================================

database:
  # PostgreSQL 主数据库配置
  postgres:
    host: "localhost"
    port: 5432
    database: "cookagent"
    user: "cookagent"
    # 连接池配置
    pool_size: 20
    max_overflow: 30
    pool_timeout: 30
    pool_recycle: 1800
    # 打印 SQL 查询（用于调试）
    echo: false

  # Redis 键值存储和缓存配置
  redis:
    host: "localhost"
    port: 6379
    db: 0

  # Milvus 向量数据库配置
  milvus:
    host: "localhost"
    port: 19530

# =============================================================================
# 12. 数据存储路径配置
# =============================================================================
# 数据存储路径配置
# =============================================================================

paths:
  # HowToCook 数据存储路径配置
  base_data_path: "data/HowToCook"

# =============================================================================
# 13. GitHub Issues 配置（可选）
# =============================================================================
# 用于自托管 GitHub Issues 功能的相关配置。
# =============================================================================

blank_issues_enabled: true
contact_links: []
